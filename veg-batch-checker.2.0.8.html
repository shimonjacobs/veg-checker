<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Veg Batch Checker — v2.0.8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#16a34a" />
  <style>
    button{touch-action:manipulation}
    @keyframes toast-shrink {
      0%, 71% { max-height: 80px; margin-bottom: 0.5rem; }
      100%    { max-height: 0;    margin-bottom: 0; }
    }
    @keyframes toast-float {
      0%   { transform: scale(0.9); opacity: 0; }
      12%  { transform: scale(1);   opacity: 1; }
      71%  { transform: translateY(0);    opacity: 1; }
      100% { transform: translateY(-40px); opacity: 0; }
    }
    .toast-wrapper     { animation: toast-shrink 1.7s ease-out forwards; overflow: hidden; }
    .animate-bounce-in { animation: toast-float  1.7s ease-out forwards; }
    @keyframes pop-in {
      0%   { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .animate-pop-in { animation: pop-in 0.2s ease-out forwards; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
  const { useState, useEffect, useRef } = React;

  const APP_VERSION = "2.0.8";
  const STORAGE_KEY = "veg-batch-checker:v9";
  const VEG_DB_KEY = "veg-batch-checker:vegdb-v4";
  const META_KEY = "veg-batch-checker:meta";

  const uid = () => Math.random().toString(36).slice(2,10);

  function getRequiredStages(batch) {
    if (batch.requiredStages) return batch.requiredStages;
    // Fallback for batches imported from older versions without requiredStages
    if (/broccoli|tenderstem/i.test(batch.veg)) return ["Banging check", "Water 1", "Thrip cloth 1", "Water 2", "Thrip cloth 2"];
    if (/cauliflower/i.test(batch.veg)) return ["Visual check", "Water", "Thrip cloth"];
    return ["Water", "Thrip cloth"];
  }

  function nextStage(batch) {
    const cur = batch.history.filter(h => h.attempt === batch.attempt);
    const reqs = getRequiredStages(batch);
    for (const stage of reqs) {
      if (!cur.some(h => h.stage === stage && h.result === "Pass")) {
        return stage;
      }
    }
    return "Done";
  }

  function VegDBManager({ vegDB, setVegDB }) {
    const [newName, setNewName] = useState("");
    const [needsBang, setNeedsBang] = useState(false);
    const [needsVisual, setNeedsVisual] = useState(false);
    const [needsHotWater, setNeedsHotWater] = useState(false);
    const [needsDoubleWash, setNeedsDoubleWash] = useState(false);
    const [itemToDelete, setItemToDelete] = useState(null);

    const addVeg = () => {
      const n = newName.trim();
      if (!n) return;
      if (vegDB.some(v => v.name.toLowerCase() === n.toLowerCase())) { setNewName(""); return; }
      setVegDB([...vegDB, { name: n, requiresBang: needsBang, requiresVisual: needsVisual, requiresHotWater: needsHotWater, requiresDoubleWash: needsDoubleWash }]);
      setNewName("");
      setNeedsBang(false);
      setNeedsVisual(false);
      setNeedsHotWater(false);
      setNeedsDoubleWash(false);
    };

    const confirmRemove = () => {
      setVegDB(vegDB.filter(x => x.name !== itemToDelete));
      setItemToDelete(null);
    };

    return (
      <div className="space-y-6">
        <div className="border rounded-xl overflow-hidden bg-white shadow-sm">
          <table className="w-full text-left text-sm">
            <thead className="bg-gray-100 text-gray-600 border-b">
              <tr>
                <th className="p-3 font-semibold">Vegetable</th>
                <th className="p-3 font-semibold">Checks</th>
                <th className="p-3 font-semibold text-right">Action</th>
              </tr>
            </thead>
            <tbody className="divide-y">
              {vegDB.map(v => (
                <tr key={v.name} className="hover:bg-gray-50">
                  <td className="p-3 font-medium text-gray-900">{v.name}</td>
                  <td className="p-3">
                    <div className="flex gap-1 flex-wrap">
                      {v.requiresVisual && <span className="text-[10px] bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded font-bold">Visual</span>}
                      {v.requiresBang && <span className="text-[10px] bg-red-100 text-red-700 px-1.5 py-0.5 rounded font-bold">Bang</span>}
{!v.requiresBang && !v.requiresVisual && !v.requiresHotWater && <span className="text-[10px] text-gray-400">Standard</span>}
                      {v.requiresDoubleWash && <span className="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">Second check</span>}
                      {v.requiresHotWater && <span className="text-[10px] bg-orange-100 text-orange-700 px-1.5 py-0.5 rounded font-bold">Hot</span>}
                    </div>
                  </td>
                  <td className="p-3 text-right">
                    <button onClick={() => setItemToDelete(v.name)} className="px-3 py-1.5 bg-red-100 text-red-700 rounded-lg font-medium text-xs">Delete</button>
                  </td>
                </tr>
              ))}
              {vegDB.length === 0 && (
                <tr>
                  <td colSpan="3" className="p-4 text-center text-gray-500">Database is empty.</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>

        <div className="flex flex-col gap-3 p-4 bg-white shadow-sm rounded-xl border border-gray-200">
          <h3 className="font-semibold text-gray-700 text-sm">Add New Item</h3>
          <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Vegetable name" className="border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" />
          <div className="flex flex-col gap-2 mt-1">
            <label className="flex items-center gap-2 text-sm text-gray-700">
              <input type="checkbox" checked={needsBang} onChange={e=>setNeedsBang(e.target.checked)} className="rounded w-4 h-4 text-blue-600" />
              Requires 'Banging check' stage
            </label>
            <label className="flex items-center gap-2 text-sm text-gray-700">
              <input type="checkbox" checked={needsVisual} onChange={e=>setNeedsVisual(e.target.checked)} className="rounded w-4 h-4 text-blue-600" />
              Requires 'Visual check' stage
            </label>
            <label className="flex items-center gap-2 text-sm text-gray-700">
              <input type="checkbox" checked={needsHotWater} onChange={e=>setNeedsHotWater(e.target.checked)} className="rounded w-4 h-4 text-blue-600" />
              Requires hot water
            </label>
            <label className="flex items-center gap-2 text-sm text-gray-700">
              <input type="checkbox" checked={needsDoubleWash} onChange={e=>setNeedsDoubleWash(e.target.checked)} className="rounded w-4 h-4 text-blue-600" />
              Requires second wash (Water 2 + Thrip 2)
            </label>
          </div>
          <button onClick={addVeg} className="py-3 mt-2 rounded-xl bg-blue-600 text-white font-medium w-full">Add Item</button>
        </div>

        {itemToDelete && (
          <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 animate-pop-in">
              <h3 className="text-xl font-bold text-gray-900 mb-2">Delete {itemToDelete}?</h3>
              <p className="text-sm text-gray-600 mb-6">Are you sure you want to remove this vegetable from the database? This won't affect existing jobs.</p>
              <div className="flex gap-3">
                <button onClick={() => setItemToDelete(null)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium">Cancel</button>
                <button onClick={confirmRemove} className="flex-1 py-3 rounded-xl bg-red-600 text-white font-medium">Delete</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  function HoldResetButton({ onConfirm, className }) {
    const [holdProgress, setHoldProgress] = useState(0);
    const timerRef = useRef(null);

    const handleStart = () => {
      const startTime = Date.now();
      timerRef.current = setInterval(() => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min((elapsed / 1500) * 100, 100);
        setHoldProgress(progress);
        if (progress >= 100) {
          clearInterval(timerRef.current);
          onConfirm();
          setHoldProgress(0);
        }
      }, 20);
    };

    const handleEnd = () => {
      clearInterval(timerRef.current);
      setHoldProgress(0);
    };

    return (
      <button
        onMouseDown={handleStart} onMouseUp={handleEnd} onMouseLeave={handleEnd}
        onTouchStart={handleStart} onTouchEnd={handleEnd}
        className={`relative overflow-hidden ${className || 'px-3 py-2 rounded-xl bg-gray-200 text-gray-800'}`}
      >
        <span className="relative z-10">Hold to Reset</span>
        <div
          className="absolute bottom-0 left-0 h-full bg-black transition-all duration-75"
          style={{ width: `${holdProgress}%`, opacity: holdProgress > 0 ? 0.2 : 0 }}
        ></div>
      </button>
    );
  }

  function ImportConfirmModal({ onConfirm, onCancel }) {
    return (
      <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 animate-pop-in">
          <h3 className="text-xl font-bold text-gray-900 mb-2">Import JSON?</h3>
          <p className="text-sm text-gray-600 mb-6">
            This will <span className="font-bold text-red-600">replace all current data</span> with the imported file. Make sure you have exported a backup first if you want to keep your current data.
          </p>
          <div className="flex gap-3">
            <button onClick={onCancel} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium">Cancel</button>
            <button onClick={onConfirm} className="flex-1 py-3 rounded-xl bg-red-600 text-white font-medium">Import &amp; Replace</button>
          </div>
        </div>
      </div>
    );
  }

  function AnalyticsDashboard({ batches }) {
    const completedBatches = batches.filter(b => b.status === "Passed" || b.status === "Discarded");
    const totalCompleted = completedBatches.length;
    const passedFirstTry = completedBatches.filter(b => b.status === "Passed" && b.attempt === 0).length;
    const fpy = totalCompleted > 0 ? Math.round((passedFirstTry / totalCompleted) * 100) : 0;
    const totalDiscards = completedBatches.filter(b => b.status === "Discarded").length;
    const totalBangingRejects = batches.reduce((sum, b) => sum + (b.bangingRejects || 0), 0);

    const stageFails = {};
    batches.forEach(b => { if (b.firstFailStage) stageFails[b.firstFailStage] = (stageFails[b.firstFailStage] || 0) + 1; });
    const topBottleneck = Object.keys(stageFails).sort((a,b) => stageFails[b] - stageFails[a])[0] || "None";

    const vegStats = {};
    completedBatches.forEach(b => {
      if (!vegStats[b.veg]) vegStats[b.veg] = { total: 0, passedFirstTry: 0, discards: 0 };
      vegStats[b.veg].total += 1;
      if (b.status === "Passed" && b.attempt === 0) vegStats[b.veg].passedFirstTry += 1;
      if (b.status === "Discarded") vegStats[b.veg].discards += 1;
    });
    const vegArray = Object.keys(vegStats).map(veg => {
      const s = vegStats[veg];
      return { veg, total: s.total, fpy: Math.round((s.passedFirstTry / s.total) * 100), discardRate: Math.round((s.discards / s.total) * 100) };
    }).sort((a, b) => b.total - a.total);

    let totalMs = 0, validTimes = 0;
    completedBatches.forEach(b => {
      if (b.timerStart && b.history.length > 0) {
        const endTs = b.history[b.history.length - 1].ts;
        if (endTs > b.timerStart) { totalMs += (endTs - b.timerStart); validTimes += 1; }
      }
    });
    const avgMs = validTimes > 0 ? totalMs / validTimes : 0;
    const avgMins = Math.floor(avgMs / 60000);
    const avgSecs = String(Math.floor((avgMs % 60000) / 1000)).padStart(2, '0');

    return (
      <div className="bg-white rounded-2xl shadow p-4">
        <h2 className="text-lg font-bold mb-4">Operations Dashboard</h2>
        <div className="grid grid-cols-2 gap-3 mb-6">
          <div className="bg-gray-50 rounded-xl p-3 border">
            <div className="text-xs font-semibold text-gray-500 mb-1">First-Pass Yield</div>
            <div className={`text-2xl font-bold ${fpy >= 90 ? 'text-emerald-600' : 'text-red-600'}`}>{fpy}%</div>
            <div className="text-[10px] text-gray-400 mt-1">Goal: 90%+</div>
          </div>
          <div className="bg-gray-50 rounded-xl p-3 border">
            <div className="text-xs font-semibold text-gray-500 mb-1">Avg Process Time</div>
            <div className="text-2xl font-bold text-gray-800">{avgMins}m {avgSecs}s</div>
            <div className="text-[10px] text-gray-400 mt-1">Per completed batch</div>
          </div>
          <div className="bg-gray-50 rounded-xl p-3 border">
            <div className="text-xs font-semibold text-gray-500 mb-1">Total Waste</div>
            <div className="text-lg font-bold text-red-600">{totalDiscards} Batches</div>
            <div className="text-sm font-semibold text-orange-500">+ {totalBangingRejects} items</div>
          </div>
          <div className="bg-gray-50 rounded-xl p-3 border">
            <div className="text-xs font-semibold text-gray-500 mb-1">Top Bottleneck</div>
            <div className="text-lg font-bold text-gray-800 break-words">{topBottleneck}</div>
            <div className="text-[10px] text-gray-400 mt-1">Most common failure stage</div>
          </div>
        </div>
        <h3 className="text-md font-bold mb-2">Problematic Produce</h3>
        {vegArray.length === 0 ? (
          <p className="text-sm text-gray-500">No completed batches yet.</p>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-left text-sm">
              <thead className="bg-gray-100 text-gray-600">
                <tr>
                  <th className="p-2 rounded-tl-lg rounded-bl-lg">Veg</th>
                  <th className="p-2">Vol</th>
                  <th className="p-2">FPY</th>
                  <th className="p-2 rounded-tr-lg rounded-br-lg">Discard</th>
                </tr>
              </thead>
              <tbody className="divide-y">
                {vegArray.map(v => (
                  <tr key={v.veg}>
                    <td className="p-2 font-medium">{v.veg}</td>
                    <td className="p-2">{v.total}</td>
                    <td className={`p-2 font-bold ${v.fpy < 90 ? 'text-red-500' : 'text-emerald-500'}`}>{v.fpy}%</td>
                    <td className="p-2 text-gray-600">{v.discardRate}%</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    );
  }

  const TABS = [
    { id: "Jobs", label: "Jobs" },
    { id: "Plan", label: "Plan" },
    { id: "Reports", label: "Reports" },
    {
      id: "Settings",
      icon: (
        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      )
    }
  ];

  function App() {
    const [batches, setBatches] = useState(() => {
      try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch {}
      return [];
    });

    const defaultVegDB = [
      { name: "Romaine",    requiresBang: false, requiresVisual: false, requiresHotWater: false, requiresDoubleWash: false },
      { name: "Iceberg",    requiresBang: false, requiresVisual: false, requiresHotWater: false, requiresDoubleWash: false },
      { name: "Leeks",      requiresBang: false, requiresVisual: false, requiresHotWater: false, requiresDoubleWash: false },
      { name: "Spinach",    requiresBang: false, requiresVisual: false, requiresHotWater: false, requiresDoubleWash: false },
      { name: "Herbs",      requiresBang: false, requiresVisual: false, requiresHotWater: false, requiresDoubleWash: false },
      { name: "Corn",       requiresBang: false, requiresVisual: false, requiresHotWater: true,  requiresDoubleWash: false },
      { name: "Broccoli",   requiresBang: true,  requiresVisual: false, requiresHotWater: true,  requiresDoubleWash: true  },
      { name: "Tenderstem", requiresBang: true,  requiresVisual: false, requiresHotWater: true,  requiresDoubleWash: true  },
      { name: "Cauliflower",requiresBang: false, requiresVisual: true,  requiresHotWater: false, requiresDoubleWash: false }
    ];

    const [vegDB, setVegDB] = useState(() => {
      try { const raw = localStorage.getItem(VEG_DB_KEY); if (raw) return JSON.parse(raw); } catch {}
      return defaultVegDB;
    });

    const [tab, setTab] = useState("Jobs");
    const [veg, setVeg] = useState("");
    const [qty, setQty] = useState("1");
    const [customRequiresBang, setCustomRequiresBang] = useState(false);
    const [customRequiresVisual, setCustomRequiresVisual] = useState(false);
    const [customRequiresHotWater, setCustomRequiresHotWater] = useState(false);
    const [customRequiresDoubleWash, setCustomRequiresDoubleWash] = useState(false);
    const [toasts, setToasts] = useState([]);
    const [selectedQty, setSelectedQty] = useState(1);
    const [expanded, setExpanded] = useState([]);
    const [now, setNow] = useState(Date.now());
    const [pendingImport, setPendingImport] = useState(null);
    const [customOpen, setCustomOpen] = useState(false);
    const [batchToDelete, setBatchToDelete] = useState(null);

    useEffect(() => { const t = setInterval(() => setNow(Date.now()), 1000); return () => clearInterval(t); }, []);
    useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(batches)); }, [batches]);
    useEffect(() => { localStorage.setItem(VEG_DB_KEY, JSON.stringify(vegDB)); }, [vegDB]);
    useEffect(() => {
      try { localStorage.setItem(META_KEY, JSON.stringify({ version: APP_VERSION, savedAt: new Date().toISOString() })); } catch (e) {}
    }, []);

    const planned = batches.filter(b => b.status === "Planned");
    const active = batches.filter(b => b.status === "In Progress");
    const completed = batches.filter(b => b.status === "Passed");
    const discarded = batches.filter(b => b.status === "Discarded");
    const incomplete = [...planned, ...discarded];

    const addToast = (msg, type = "success") => {
      const id = uid();
      setToasts(prev => [...prev, { id, msg, type }]);
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 1700);
    };

    const quickAdd = (vegObj, count) => {
      let n = parseInt(count, 10); if (!Number.isFinite(n) || n<1) n=1; if (n>500) n=500;

      let reqStages = [];
      if (vegObj.requiresDoubleWash || /broccoli|tenderstem/i.test(vegObj.name)) {
        if (vegObj.requiresVisual) reqStages.push("Visual check");
        if (vegObj.requiresBang) reqStages.push("Banging check");
        reqStages.push("Water 1", "Thrip cloth 1", "Water 2", "Thrip cloth 2");
      } else {
        if (vegObj.requiresVisual) reqStages.push("Visual check");
        if (vegObj.requiresBang) reqStages.push("Banging check");
        reqStages.push("Water", "Thrip cloth");
      }

      const newOnes = Array.from({length:n}, (_,i)=> ({
        id: uid(),
        veg: vegObj.name,
        qty: n>1 ? `#${i+1} of ${n}` : undefined,
        status: "Planned",
        attempt: 0,
        history: [],
        requiredStages: reqStages,
        bangingRejects: 0,
        hotWater: !!vegObj.requiresHotWater
      }));
      setBatches(prev => [...newOnes, ...prev]);
      addToast(`Added ${n} ${vegObj.name}`);
    };

    const addBatch = () => {
      const name = veg.trim();
      if (!name) return;
      quickAdd({ name, requiresBang: customRequiresBang, requiresVisual: customRequiresVisual, requiresHotWater: customRequiresHotWater, requiresDoubleWash: customRequiresDoubleWash }, qty);
      setVeg(""); setQty("1"); setCustomRequiresBang(false); setCustomRequiresVisual(false); setCustomRequiresHotWater(false); setCustomRequiresDoubleWash(false);
    };

    const startFromPlan = (id) => {
      const ts = Date.now();
      setBatches(prev => prev.map(b => b.id===id ? { ...b, status:"In Progress", timerStart: ts } : b));
      setTab("Jobs");
      setExpanded(prev => prev.includes(id) ? prev : [...prev, id]);
    };

    const deleteBatch = (id) => {
      setBatches(prev => prev.filter(b => b.id !== id));
      setExpanded(prev => prev.filter(x => x !== id));
    };

    const toggleExpand = (id) => {
      setExpanded(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
    };

    const recordResult = (id, result) => {
      const batch = batches.find(b => b.id === id);
      if (!batch) return;
      const stage = nextStage(batch);

      if (result === "RejectItem") {
        setBatches(prev => prev.map(b => b.id === id ? { ...b, bangingRejects: (b.bangingRejects || 0) + 1 } : b));
        return;
      }

      let finalResult = result;
      if (result === "FinishBanging") {
        finalResult = "Pass";
        addToast(`${batch.veg}: Finished Banging`, "success");
      } else if (result === "CompleteVisual") {
        finalResult = "Pass";
        addToast(`${batch.veg}: Visual Check Completed`, "success");
      } else if (result === "Pass") {
        addToast(`${batch.veg}: Passed ${stage}`, "success");
      } else {
        addToast(`${batch.veg}: Failed ${stage}`, "error");
      }

      setExpanded(prev => prev.filter(x => x !== id));
      setBatches(prev => prev.map(b => {
        if (b.id !== id || b.status !== "In Progress") return b;

        const ev = { ts: Date.now(), stage, result: finalResult, attempt: b.attempt };
        const history = [...b.history, ev];

        if (finalResult === "Fail") {
          if (b.attempt === 0) return { ...b, firstFailStage: b.firstFailStage || stage, status: "Planned", attempt: 1, history };
          return { ...b, firstFailStage: b.firstFailStage || stage, status: "Discarded", history };
        } else {
          const cur = history.filter(h => h.attempt === b.attempt);
          const reqs = getRequiredStages(b);
          const allPassed = reqs.every(reqStage => cur.some(h => h.stage === reqStage && h.result === "Pass"));

          if (allPassed) return { ...b, status: "Passed", history };
          if (result === "FinishBanging" || result === "CompleteVisual") return { ...b, status: "Planned", history };

          // Reset timer precisely when entering a Water stage
          const ns = nextStage({ ...b, history });
          if (ns.includes("Water")) return { ...b, status: "In Progress", timerStart: Date.now(), history };

          return { ...b, status: "In Progress", history };
        }
      }));
    };

    const makeEODText = () => {
      const byVeg = new Map();
      for (const b of batches) {
        const k = b.veg;
        if (!byVeg.has(k)) byVeg.set(k, { total:0, rewashWater:0, rewashThrip:0, rejects:0, bangingRejects:0 });
        const r = byVeg.get(k);
        r.total += 1;
        if (b.firstFailStage && b.firstFailStage.includes("Water")) r.rewashWater += 1;
        if (b.firstFailStage && b.firstFailStage.includes("Thrip cloth")) r.rewashThrip += 1;
        if (b.status === "Discarded") r.rejects += 1;
        if (b.bangingRejects > 0) r.bangingRejects += b.bangingRejects;
      }
      const lines = [];
      const order = [...byVeg.keys()].sort((a,b)=>a.toLowerCase().localeCompare(b.toLowerCase()));
      for (const veg of order) {
        const r = byVeg.get(veg);
        const parts = [];
        if (r.rewashWater===0 && r.rewashThrip===0 && r.rejects===0 && r.bangingRejects===0) {
          parts.push("all clean");
        } else {
          const issues = [];
          if (r.bangingRejects>0) issues.push(`${r.bangingRejects} failed at banging`);
          if (r.rewashWater>0) issues.push(`${r.rewashWater} rewash (Water)`);
          if (r.rewashThrip>0) issues.push(`${r.rewashThrip} rewash (Thrip cloth)`);
          if (issues.length > 0) parts.push(issues.join(", "));
          if (r.rejects>0) parts.push(`${r.rejects} reject${r.rejects>1?"s":""}`);
        }
        lines.push(`${veg} (${r.total} bowls) ${parts.join(" ")}`.trim());
      }
      return lines.join("\n");
    };

    const downloadEOD = () => {
      const blob = new Blob([makeEODText()], { type: "text/plain;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = `veg_eod_${new Date().toISOString().slice(0,10)}.txt`;
      a.click(); URL.revokeObjectURL(url);
    };

    const copyEOD = async () => {
      try { await navigator.clipboard.writeText(makeEODText()); addToast("Summary copied.", "success"); }
      catch { addToast("Could not copy. Use Download TXT.", "error"); }
    };

    const makeCSV = () => {
      const byVeg = new Map();
      for (const b of batches) {
        const k = b.veg;
        if (!byVeg.has(k)) byVeg.set(k, { planned:0, passed:0, discarded:0, firstFailWater:0, firstFailThrip:0, rewashes:0, bangingRejects:0 });
        const r = byVeg.get(k);
        r.planned += 1;
        if (b.status === "Passed") r.passed += 1;
        if (b.status === "Discarded") r.discarded += 1;
        if (b.firstFailStage && b.firstFailStage.includes("Water")) r.firstFailWater += 1;
        if (b.firstFailStage && b.firstFailStage.includes("Thrip cloth")) r.firstFailThrip += 1;
        if (b.attempt > 0) r.rewashes += 1;
        if (b.bangingRejects > 0) r.bangingRejects += b.bangingRejects;
      }
      const rows = [
        ["Veg","Planned","Passed","Discarded","Failed at Banging","First fail: Water","First fail: Thrip cloth","Had rewash (>=1 fail)"],
        ...Array.from(byVeg.entries()).map(([k,r])=>[k,r.planned,r.passed,r.discarded,r.bangingRejects,r.firstFailWater,r.firstFailThrip,r.rewashes]),
        [],["Details"],
        ["ID","Veg","Qty/Notes","Status","Attempt","BangingRejects","FirstFailStage","EventTime","Stage","Result","Attempt#"],
        ...batches.flatMap(b => b.history.length===0
          ? [[b.id,b.veg,b.qty??"",b.status,b.attempt,b.bangingRejects||0,b.firstFailStage??"","","","",""]]
          : b.history.map(h => [b.id,b.veg,b.qty??"",b.status,b.attempt,b.bangingRejects||0,b.firstFailStage??"", new Date(h.ts).toLocaleString(), h.stage, h.result, h.attempt]))
      ];
      const NL="\r\n";
      const toCSV = rs => rs.map(r=>r.map(v=>{
        const s=String(v??""); return /[,\"\n]/.test(s)?('"' + s.replace(/"/g,'""') + '"'):s;
      }).join(",")).join(NL);
      const csv = toCSV(rows)+NL;
      const blob = new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url; a.download=`veg_report_${new Date().toISOString().slice(0,10)}.csv`; a.click(); URL.revokeObjectURL(url);
    };

    const exportJSON = () => {
      const blob = new Blob([JSON.stringify(batches,null,2)],{type:"application/json"});
      const url = URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`veg_batches_${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(url);
    };

    const importJSON = (e) => {
      const file = e.target.files?.[0]; if (!file) return;
      e.target.value = "";
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(String(reader.result));
          if (!Array.isArray(data)) throw new Error("Not an array");
          setPendingImport(data);
        } catch { addToast("Could not read JSON file", "error"); }
      };
      reader.readAsText(file);
    };

    const confirmImport = () => {
      if (pendingImport) { setBatches(pendingImport); addToast("Data imported successfully"); }
      setPendingImport(null);
    };

    const resetDay = () => { setBatches([]); setExpanded([]); addToast("All data cleared", "success"); };

    const Badge = ({ children, color }) => <span className={"px-2 py-0.5 rounded-full text-xs font-medium "+color}>{children}</span>;

    const TimerChip = ({ b }) => {
      if (!(b.status==="In Progress" && b.timerStart)) return null;
      const curStage = nextStage(b);
      if (!curStage.includes("Water")) return null;
      const rem = Math.max(0, 180000 - (now - b.timerStart));
      const m = Math.floor(rem/60000);
      const s = String(Math.floor((rem%60000)/1000)).padStart(2,"0");
      return <span className={"text-xs px-1.5 py-0.5 rounded " + (rem===0 ? "bg-red-600 text-white" : "bg-gray-200 text-gray-800")}>{m}:{s}</span>;
    };

    const JobCard = ({ b }) => {
      const currentStage = nextStage(b);
      return (
        <div className="relative bg-white rounded-2xl shadow p-4">
          {b.attempt > 0 && <span className="absolute top-0 left-0 w-0 h-0 border-t-[28px] border-t-black border-r-[28px] border-r-transparent" title="Rewash"></span>}
          <div className="flex items-start justify-between gap-3">
            <div>
              <div className="font-semibold flex items-center gap-2">
                {b.veg} <TimerChip b={b} />
              </div>
              <div className="mt-1 flex gap-2 items-center">
                {b.status === "In Progress" && <Badge color="bg-blue-100 text-blue-700">In Progress</Badge>}
                {b.status === "Passed" && <Badge color="bg-emerald-100 text-emerald-700">Passed</Badge>}
                {b.status === "Discarded" && <Badge color="bg-red-100 text-red-700">Discarded</Badge>}
                {(currentStage.includes("Water") || currentStage.includes("Thrip")) && <span className="text-[11px] text-gray-400">Attempt {b.attempt + 1}</span>}
                {b.status === "In Progress" && <span className="px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700">{currentStage}</span>}
              </div>
            </div>
            <div className="flex items-center gap-2">
              {b.status === "In Progress" && <button onClick={()=>toggleExpand(b.id)} className="px-3 py-2 rounded-xl bg-emerald-600 text-white">{expanded.includes(b.id) ? "Hide" : "Check"}</button>}
              <button onClick={()=>setBatchToDelete(b.id)} className="px-3 py-2 rounded-xl bg-gray-200">Delete</button>
            </div>
          </div>
          {expanded.includes(b.id) && b.status === "In Progress" && (
            currentStage === "Banging check" ? (
              <div className="mt-4 flex flex-col gap-3">
                <div className="flex justify-between items-center bg-gray-100 p-3 rounded-xl border border-gray-200">
                  <span className="font-semibold text-gray-700">Items failed at banging:</span>
                  <span className="text-xl font-bold text-red-600">{b.bangingRejects || 0}</span>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={()=>recordResult(b.id,"RejectItem")} className="h-20 text-lg leading-tight font-bold rounded-2xl text-white bg-orange-500 active:scale-[.99]">REJECT<br/>ITEM</button>
                  <button onClick={()=>recordResult(b.id,"FinishBanging")} className="h-20 text-lg leading-tight font-bold rounded-2xl text-white bg-emerald-600 active:scale-[.99]">FINISH<br/>BANGING</button>
                </div>
              </div>
            ) : currentStage === "Visual check" ? (
              <div className="mt-4">
                <button onClick={()=>recordResult(b.id,"CompleteVisual")} className="w-full h-24 text-2xl font-bold rounded-2xl text-white bg-blue-600 active:scale-[.99]">COMPLETE<br/>VISUAL CHECK</button>
              </div>
            ) : (
              <div className="mt-4 flex flex-col gap-3">
                {b.hotWater && currentStage.includes("Water") && (
                  <div className="flex items-center justify-center gap-2 bg-orange-100 border border-orange-300 rounded-xl px-4 py-3">
                    <span className="text-orange-600 font-bold text-base">HOT WATER REQUIRED</span>
                  </div>
                )}
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={()=>recordResult(b.id,"Pass")} className="h-24 text-2xl font-bold rounded-2xl text-white bg-emerald-600 active:scale-[.99]">PASS</button>
                  <button onClick={()=>recordResult(b.id,"Fail")} className="h-24 text-2xl font-bold rounded-2xl text-white bg-red-600 active:scale-[.99]">FAIL</button>
                </div>
              </div>
            )
          )}
        </div>
      );
    };

    return (
      <div className="min-h-screen flex flex-col relative">
        {pendingImport && <ImportConfirmModal onConfirm={confirmImport} onCancel={() => setPendingImport(null)} />}
        {batchToDelete && (
          <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm">
            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 animate-pop-in">
              <h3 className="text-xl font-bold text-gray-900 mb-2">Delete job?</h3>
              <p className="text-sm text-gray-600 mb-6">This will permanently remove the job and its history.</p>
              <div className="flex gap-3">
                <button onClick={() => setBatchToDelete(null)} className="flex-1 py-3 rounded-xl bg-gray-100 text-gray-700 font-medium">Cancel</button>
                <button onClick={() => { deleteBatch(batchToDelete); setBatchToDelete(null); }} className="flex-1 py-3 rounded-xl bg-red-600 text-white font-medium">Delete</button>
              </div>
            </div>
          </div>
        )}

        <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 flex flex-col w-1/2 pointer-events-none">
          {toasts.map(t => (
            <div key={t.id} className="toast-wrapper">
              <div className={`px-4 py-3 rounded-2xl shadow-lg text-white text-center font-medium animate-bounce-in ${t.type === 'success' ? 'bg-emerald-600' : 'bg-red-600'}`}>
                {t.msg}
              </div>
            </div>
          ))}
        </div>

        <header className="sticky top-0 z-10 bg-white/90 backdrop-blur border-b">
          <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 className="text-sm sm:text-lg font-bold">Veg Batch Checker</h1>
            <div className="flex items-center gap-3">
              <nav className="flex gap-0.5 sm:gap-1 text-sm items-center">
                {TABS.map(t => (
                  <button
                    key={t.id}
                    onClick={() => setTab(t.id)}
                    className={"px-2 sm:px-3 py-1.5 rounded-xl flex items-center justify-center " + (tab === t.id ? "bg-gray-900 text-white" : "bg-gray-200 text-gray-800")}
                    aria-label={t.id}
                  >
                    {t.icon ? t.icon : t.label}
                  </button>
                ))}
              </nav>
              <span className="hidden sm:inline text-xs text-gray-500">v{APP_VERSION}</span>
            </div>
          </div>
        </header>

        <main className="flex-1 max-w-3xl mx-auto w-full px-4 py-4">
          {tab==="Jobs" && (
            <div className="space-y-3">
              {active.length===0 && discarded.length===0 && <p className="text-sm text-gray-500">No jobs in progress. Start some below.</p>}
              {active.map(b => <JobCard key={b.id} b={b} />)}

              {discarded.length > 0 && (
                <div className="mt-2">
                  <h3 className="text-sm font-semibold text-red-600 mb-2">Discarded this session ({discarded.length})</h3>
                  <div className="space-y-2">
                    {discarded.map(b => (
                      <div key={b.id} className="relative flex items-center justify-between bg-red-50 border border-red-200 p-3 rounded-xl overflow-hidden">
                        <span className="absolute top-0 left-0 w-0 h-0 border-t-[20px] border-t-red-500 border-r-[20px] border-r-transparent"></span>
                        <div>
                          <div className="font-medium text-gray-800">{b.veg}</div>
                          <div className="text-xs text-red-500">Failed at {b.firstFailStage || "unknown stage"}</div>
                        </div>
                        <button onClick={()=>deleteBatch(b.id)} className="px-3 py-1.5 rounded-xl bg-gray-200 text-sm">Delete</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {planned.length>0 && (
                <div className="mt-6">
                  <h3 className="text-sm font-semibold text-gray-600 mb-2 flex items-center gap-1.5">
                    Available jobs
                    <span className="bg-gray-200 text-gray-600 text-xs px-1.5 py-0.5 rounded-full font-medium">{planned.length}</span>
                  </h3>
                  <div className="space-y-2">
                    {(() => {
                      const sorted = [...planned].sort((a,b)=>a.veg.toLowerCase().localeCompare(b.veg.toLowerCase()));
                      const groups = [];
                      const keyMap = {};
                      sorted.forEach(b => {
                        const reqs = getRequiredStages(b);
                        const needsBang = reqs.includes("Banging check");
                        const isBanged = b.history.some(h => h.attempt === b.attempt && h.stage === "Banging check" && h.result === "Pass");
                        const needsVisual = reqs.includes("Visual check");
                        const isVisualDone = b.history.some(h => h.attempt === b.attempt && h.stage === "Visual check" && h.result === "Pass");
                        const key = `${b.veg}|${b.attempt}|${needsBang}|${isBanged}|${needsVisual}|${isVisualDone}`;
                        if (!keyMap[key]) {
                          const g = { key, veg: b.veg, count: 0, batches: [], attempt: b.attempt, needsBang, isBanged, needsVisual, isVisualDone };
                          keyMap[key] = g;
                          groups.push(g);
                        }
                        keyMap[key].count++;
                        keyMap[key].batches.push(b);
                      });
                      return groups.map(g => (
                        <div key={g.key} className="flex items-center justify-between bg-gray-50 p-3 rounded-xl">
                          <div className="flex items-center gap-2 flex-wrap min-w-0">
                            <span className="font-medium">{g.veg}</span>
                            {g.count > 1 && <span className="text-xs bg-gray-200 text-gray-600 px-1.5 py-0.5 rounded-full font-medium shrink-0">×{g.count}</span>}
                            {g.attempt > 0 && <span className="text-[10px] bg-gray-700 text-white px-1.5 py-0.5 rounded font-bold leading-none shrink-0">Rewash</span>}
                            {g.needsBang && !g.isBanged && <span className="text-[10px] bg-red-600 text-white px-1.5 py-0.5 rounded font-bold leading-none shrink-0">Bang</span>}
                            {g.isBanged && <span className="text-[10px] bg-blue-800 text-white px-1.5 py-0.5 rounded font-bold leading-none shrink-0">Banged</span>}
                            {g.needsVisual && !g.isVisualDone && <span className="text-[10px] bg-purple-600 text-white px-1.5 py-0.5 rounded font-bold leading-none shrink-0">Visual</span>}
                            {g.isVisualDone && <span className="text-[10px] bg-blue-800 text-white px-1.5 py-0.5 rounded font-bold leading-none shrink-0">Visual Done</span>}
                          </div>
                          <button onClick={()=>startFromPlan(g.batches[0].id)} className="px-3 py-2 rounded-xl bg-blue-600 text-white text-sm shrink-0 ml-2">Start</button>
                        </div>
                      ));
                    })()}
                  </div>
                </div>
              )}
            </div>
          )}

          {tab==="Plan" && (
            <div className="space-y-4">
              <div className="bg-white rounded-2xl shadow p-4">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-lg font-semibold">Vegetable Database</h2>
                  <div className="flex items-center gap-2 text-sm">
                    <span>Qty:</span>
                    {[1,2,4,6,8].map(n => (
                      <button key={n} onClick={()=>setSelectedQty(n)} className={"px-2 py-1 rounded-lg border " + (selectedQty===n ? "bg-gray-900 text-white border-gray-900" : "bg-white text-gray-800")}>{n}</button>
                    ))}
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-2">
                  {vegDB.map(vegObj => (
                    <button key={vegObj.name} onClick={()=>quickAdd(vegObj, selectedQty)} className="px-2 py-2 rounded-xl bg-blue-600 text-white text-sm">
                      {vegObj.name}
                    </button>
                  ))}
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow p-4">
                <button onClick={()=>setCustomOpen(o=>!o)} className="flex items-center justify-between w-full">
                  <h2 className="text-lg font-semibold">One-off Custom Veg</h2>
                  <span className="text-gray-400 text-sm">{customOpen ? "▲" : "▼"}</span>
                </button>
                {customOpen && (
                  <div className="mt-3 space-y-3">
                    <input value={veg} onChange={e=>setVeg(e.target.value)} placeholder="Veg name (e.g., Rare Mushroom)" className="w-full border rounded-xl p-3"/>
                    <input type="number" min="1" max="500" inputMode="numeric" value={qty} onChange={e=>setQty(e.target.value)} placeholder="Quantity (jobs to create)" className="w-full border rounded-xl p-3"/>
                    <div className="flex flex-col gap-2">
                      <label className="flex items-center gap-2 text-sm text-gray-700">
                        <input type="checkbox" checked={customRequiresBang} onChange={e=>setCustomRequiresBang(e.target.checked)} className="rounded w-4 h-4" />
                        Requires 'Banging check' stage
                      </label>
                      <label className="flex items-center gap-2 text-sm text-gray-700">
                        <input type="checkbox" checked={customRequiresVisual} onChange={e=>setCustomRequiresVisual(e.target.checked)} className="rounded w-4 h-4" />
                        Requires 'Visual check' stage
                      </label>
                      <label className="flex items-center gap-2 text-sm text-gray-700">
                        <input type="checkbox" checked={customRequiresHotWater} onChange={e=>setCustomRequiresHotWater(e.target.checked)} className="rounded w-4 h-4" />
                        Requires hot water
                      </label>
                      <label className="flex items-center gap-2 text-sm text-gray-700">
                        <input type="checkbox" checked={customRequiresDoubleWash} onChange={e=>setCustomRequiresDoubleWash(e.target.checked)} className="rounded w-4 h-4" />
                        Requires second wash (Water 2 + Thrip 2)
                      </label>
                    </div>
                    <button onClick={addBatch} className="w-full py-3 rounded-xl bg-gray-900 text-white font-medium">Add temporary job</button>
                  </div>
                )}
              </div>

              <div className="bg-white rounded-2xl shadow">
                <div className="px-4 py-3 text-lg font-semibold border-b flex items-center gap-2">
                  Complete
                  {completed.length > 0 && <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-normal">{completed.length}</span>}
                </div>
                <div className="p-4">
                  {completed.length===0 ? <p className="text-sm text-gray-500">No completed jobs.</p> : (
                    <ul className="space-y-2">
                      {completed.map(b => (
                        <li key={b.id} className="relative flex items-center justify-between bg-gray-50 p-3 rounded-xl overflow-hidden">
                          <span className="absolute top-0 left-0 w-0 h-0 border-t-[28px] border-t-green-600 border-r-[28px] border-r-transparent" title="Completed"></span>
                          <div>
                            <div className="font-medium">{b.veg}</div>
                            <div className="text-xs text-gray-500">{b.qty || ""}</div>
                          </div>
                          <div className="text-xs text-emerald-700 font-medium">Passed</div>
                        </li>
                      ))}
                    </ul>
                  )}
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow">
                <div className="px-4 py-3 text-lg font-semibold border-b flex items-center gap-2">
                  Incomplete
                  {(planned.length + discarded.length) > 0 && <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full font-normal">{planned.length + discarded.length}</span>}
                </div>
                <div className="p-4">
                  {planned.length===0 && discarded.length===0 ? <p className="text-sm text-gray-500">No incomplete jobs.</p> : (
                    <div className="space-y-3">
                      {planned.length > 0 && (
                        <div>
                          <p className="text-xs font-semibold text-gray-400 uppercase mb-2">Planned</p>
                          <ul className="space-y-2">
                            {planned.map(b => (
                              <li key={b.id} className="flex items-center justify-between bg-gray-50 p-3 rounded-xl">
                                <div>
                                  <div className="font-medium">{b.veg}</div>
                                  <div className="text-xs text-gray-500">{b.qty || ""}</div>
                                </div>
                                <div className="flex items-center gap-2">
                                  <button onClick={()=>startFromPlan(b.id)} className="px-3 py-2 rounded-xl bg-blue-600 text-white">Start</button>
                                  <button onClick={()=>deleteBatch(b.id)} className="px-3 py-2 rounded-xl bg-gray-200">Delete</button>
                                </div>
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}
                      {discarded.length > 0 && (
                        <div>
                          <p className="text-xs font-semibold text-gray-400 uppercase mb-2">Discarded</p>
                          <ul className="space-y-2">
                            {discarded.map(b => (
                              <li key={b.id} className="relative flex items-center justify-between bg-gray-50 p-3 rounded-xl overflow-hidden">
                                <span className="absolute top-0 left-0 w-0 h-0 border-t-[28px] border-t-red-600 border-r-[28px] border-r-transparent"></span>
                                <div>
                                  <div className="font-medium">{b.veg}</div>
                                  <div className="text-xs text-gray-500">{b.qty || ""}</div>
                                </div>
                                <div className="flex items-center gap-2">
                                  <span className="text-xs font-medium text-red-700">Discarded</span>
                                  <button onClick={()=>deleteBatch(b.id)} className="px-3 py-2 rounded-xl bg-gray-200">Delete</button>
                                </div>
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {tab==="Reports" && (
            <div className="space-y-4">
              <AnalyticsDashboard batches={batches} />

              <div className="bg-white rounded-2xl shadow p-4">
                <h2 className="text-lg font-semibold mb-2">End of day summary</h2>
                <div className="flex gap-2 flex-wrap mb-3">
                  <button onClick={copyEOD} className="px-4 py-2 rounded-xl bg-gray-200">Copy text</button>
                  <button onClick={downloadEOD} className="px-4 py-2 rounded-xl bg-gray-200">Download TXT</button>
                  <button onClick={makeCSV} className="px-4 py-2 rounded-xl bg-emerald-600 text-white font-medium">Download CSV</button>
                </div>
                <pre className="whitespace-pre-wrap text-sm bg-gray-50 rounded-xl p-3 max-h-64 overflow-auto border">{makeEODText()}</pre>
              </div>

              <div className="bg-white rounded-2xl shadow p-4">
                <h2 className="text-lg font-semibold mb-1">Historical Analytics</h2>
                <p className="text-sm text-gray-500 mb-3">Export a JSON backup, then load it into the analytics tool to view long-term trends across multiple days.</p>
                <a href="analytics.html" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-blue-600 text-white font-medium text-sm">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                  </svg>
                  Open Analytics Tool
                </a>
              </div>
            </div>
          )}

          {tab==="Settings" && (
            <div className="space-y-4">
              <div className="bg-white rounded-2xl shadow p-4">
                <h2 className="text-lg font-semibold mb-2">Vegetable Database</h2>
                <p className="text-sm text-gray-600 mb-4">Add or remove vegetables from your default quick-add list, and configure their required testing stages.</p>
                <button onClick={() => setTab("Database")} className="w-full py-3 rounded-xl bg-blue-600 text-white font-medium">Manage Database</button>
              </div>

              <div className="bg-white rounded-2xl shadow p-4">
                <h2 className="text-lg font-semibold mb-2">Backup / Restore Data</h2>
                <p className="text-sm text-gray-600 mb-4">Export your current batches and database settings, or restore from a previous JSON file. Ensure you export before clearing data.</p>
                <div className="flex gap-2 flex-wrap">
                  <button onClick={exportJSON} className="px-4 py-3 rounded-xl bg-gray-200 font-medium">Export JSON</button>
                  <label className="px-4 py-3 rounded-xl bg-gray-200 cursor-pointer flex items-center font-medium">
                    Import JSON <input type="file" accept="application/json" className="hidden" onChange={importJSON} />
                  </label>
                </div>
              </div>

              <div className="bg-white rounded-2xl shadow p-4 border border-red-100">
                <h2 className="text-lg font-semibold text-red-600 mb-2">Danger Zone</h2>
                <p className="text-sm text-gray-600 mb-4">
                  Wipes all active and completed batches.<br />
                  <span className="text-sm text-red-600 font-bold">WARNING: This action cannot be undone unless you have exported a JSON backup.</span>
                </p>
                <HoldResetButton onConfirm={resetDay} className="px-4 py-3 rounded-xl bg-red-600 text-white font-bold w-full" />
              </div>
            </div>
          )}

          {tab==="Database" && (
            <div className="space-y-4">
              <div className="flex items-center gap-3 mb-2">
                <button onClick={() => setTab("Settings")} className="p-2 bg-white border shadow-sm rounded-full text-gray-600 active:bg-gray-100">
                  <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" /></svg>
                </button>
                <h2 className="text-xl font-bold">Vegetable Database</h2>
              </div>
              <p className="text-sm text-gray-600">Add or remove vegetables from your default quick-add list, and configure their required testing stages.</p>
              <VegDBManager vegDB={vegDB} setVegDB={setVegDB} />
            </div>
          )}
        </main>
        <div className="h-4"></div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
  </script>
</body>
</html>
